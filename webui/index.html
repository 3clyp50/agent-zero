                </h3>
                <div class="chats-list-container" x-show="chatsOpen" x-collapse x-transition>
                    <ul class="config-list">
                        <template x-for="context in contexts">
                            <li>
                                <span :class="{'chat-list-button': true, 'font-bold': context.id === selected}"
                                    @click="selected = context.id; selectChat(context.id)">
                                    Chat #<span x-text="context.no"></span>
                                </span>
                                <button class="edit-button" @click="killChat(context.id)">X</button>
                            </li>
                        </template>
                    </ul>
                </div>
                </div>

                <!-- Small Sidebar File Browser -->
                <div class="pref-section" id="files-section" x-data="{ 
                    entries: [], 
                    isLoading: true, 
                    currentPath: '', 
                    parentPath: '', 
                    filesOpen: true,
                    _dragCounter: 0,
                    _boundHandlers: null,
                    
                    init() {
                        this.fetchFiles();
                        this.setupDragAndDrop();
                        
                        this.$el._x_cleanups = this.$el._x_cleanups || [];
                        this.$el._x_cleanups.push(() => {
                            this.cleanupDragAndDrop();
                        });
                    },
                    
                    setupDragAndDrop() {
                        const filesContainer = this.$el.querySelector('.files-list-container');
                        const dragdropOverlay = this.$el.querySelector('#files-dragdrop-overlay');
                        
                        if (!filesContainer || !dragdropOverlay) return;
                        
                        this._boundHandlers = {
                            dragenter: (e) => {
                                e.preventDefault();
                                this._dragCounter++;
                                if (this._dragCounter === 1) {
                                    const overlayData = Alpine.$data(dragdropOverlay);
                                    overlayData.isVisible = true;
                                    dragdropOverlay.classList.add('active');
                                }
                            },
                            dragover: (e) => {
                                e.preventDefault();
                            },
                            dragleave: (e) => {
                                e.preventDefault();
                                this._dragCounter--;
                                if (this._dragCounter === 0) {
                                    const overlayData = Alpine.$data(dragdropOverlay);
                                    overlayData.isVisible = false;
                                    dragdropOverlay.classList.remove('active');
                                }
                            },
                            drop: async (e) => {
                                e.preventDefault();
                                this._dragCounter = 0;
                                const overlayData = Alpine.$data(dragdropOverlay);
                                overlayData.isVisible = false;
                                dragdropOverlay.classList.remove('active');
                                
                                const files = Array.from(e.dataTransfer.files);
                                if (files.length > 0) {
                                    await this.handleFileUpload({ target: { files } });
                                }
                            }
                        };
                        
                        filesContainer.addEventListener('dragenter', this._boundHandlers.dragenter);
                        filesContainer.addEventListener('dragover', this._boundHandlers.dragover);
                        filesContainer.addEventListener('dragleave', this._boundHandlers.dragleave);
                        filesContainer.addEventListener('drop', this._boundHandlers.drop);
                    },
                    
                    cleanupDragAndDrop() {
                        const filesContainer = this.$el.querySelector('.files-list-container');
                        if (filesContainer && this._boundHandlers) {
                            filesContainer.removeEventListener('dragenter', this._boundHandlers.dragenter);
                            filesContainer.removeEventListener('dragover', this._boundHandlers.dragover);
                            filesContainer.removeEventListener('dragleave', this._boundHandlers.dragleave);
                            filesContainer.removeEventListener('drop', this._boundHandlers.drop);
                        }
                    },
                    
                    isArchive(filename) { 
                        const archiveExts = ['zip', 'tar', 'gz', 'rar', '7z']; 
                        const ext = filename.split('.').pop().toLowerCase(); 
                        return archiveExts.includes(ext); 
                    },
                    async fetchFiles(path = '') {
                        console.log('Fetching files:', path);
                        this.isLoading = true;
                        try {
                            const targetPath = path || this.currentPath || '$WORK_DIR';
                            const response = await fetch(`/get_work_dir_files?path=${encodeURIComponent(targetPath)}`);
                            if (response.ok) {
                                const data = await response.json();
                                this.entries = data.data.entries;
                                this.currentPath = data.data.current_path;
                                this.parentPath = data.data.parent_path;
                            } else {
                                console.error('Error fetching files:', await response.text());
                                this.entries = [];
                            }
                        } catch (error) {
                            console.error('Error:', error);
                            this.entries = [];
                        } finally {
                            this.isLoading = false;
                        }
                    },
                    async navigateUp() {
                        if (this.parentPath) {
                            await this.fetchFiles(this.parentPath);
                        }
                    },
                    async navigateToFolder(path) {
                        if (path && path !== this.currentPath) {
                            await this.fetchFiles(path);
                        }
                    },
                    async downloadFile(file) {
                        if (file.is_dir) {
                            await this.navigateToFolder(file.path);
                            return;
                        }
                        try {
                            const downloadUrl = `/download_work_dir_file?path=${encodeURIComponent(file.path)}`;
                            const response = await fetch(downloadUrl);
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            const blob = await response.blob();
                            const link = document.createElement('a');
                            link.href = window.URL.createObjectURL(blob);
                            link.download = file.name;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                            window.URL.revokeObjectURL(link.href);
                        } catch (error) {
                            window.toastFetchError('Error downloading file', error);
                            alert('Error downloading file');
                        }
                    },
                    async deleteFile(file) {
                        if (!confirm(`Are you sure you want to delete ${file.name}?`)) {
                            return;
                        }
                        try {
                            const response = await fetch('/delete_work_dir_file', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    path: file.path,
                                    currentPath: this.currentPath
                                })
                            });
                            if (response.ok) {
                                await this.fetchFiles(this.currentPath);                                
                            } else {
                                alert(`Error deleting file: ${await response.text()}`);
                            }
                        } catch (error) {
                            window.toastFetchError('Error deleting file', error);
                        }
                    },
                    async handleFileUpload(event) {
                        const files = event.target.files;
                        if (!files.length) return;

                        const formData = new FormData();
                        formData.append('path', this.currentPath);

                        for (let i = 0; i < files.length; i++) {
                            const ext = files[i].name.split('.').pop().toLowerCase();
                            if (!['zip', 'tar', 'gz', 'rar', '7z'].includes(ext)) {
                                if (files[i].size > 100 * 1024 * 1024) {
                                    alert(`File ${files[i].name} exceeds the maximum allowed size of 100MB.`);
                                    continue;
                                }
                            }
                            formData.append('files[]', files[i]);
                        }

                        try {
                            const response = await fetch('/upload_work_dir_files', {
                                method: 'POST',
                                body: formData
                            });

                            if (response.ok) {
                                const data = await response.json();
                                await this.fetchFiles(this.currentPath);
                                if (data.failed && data.failed.length > 0) {
                                    alert(`Some files failed to upload:\n${data.failed.map(f => `${f.name}: ${f.error}`).join('\n')}`);
                                }
                            } else {
                                const data = await response.json();
                                alert(data.message);
                            }
                        } catch (error) {
                            window.toastFetchError('Error uploading files', error);
                        }
                    }

        <div id="right-panel" class="panel" 
            x-data="{ 
                _dragCounter: 0,
                _boundHandlers: null,
                init() {
                    const overlay = document.getElementById('dragdrop-overlay');
                    if (!overlay) return;

                    this._boundHandlers = {
                        dragenter: (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            this._dragCounter++;
                            if (this._dragCounter === 1) {
                                const overlayData = Alpine.$data(overlay);
                                overlayData.isVisible = true;
                            }
                        },
                        dragover: (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                        },
                        dragleave: (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            this._dragCounter--;
                            if (this._dragCounter === 0) {
                                const overlayData = Alpine.$data(overlay);
                                overlayData.isVisible = false;
                            }
                        },
                        drop: (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            this._dragCounter = 0;
                            const overlayData = Alpine.$data(overlay);
                            overlayData.isVisible = false;
                        }
                    };

                    this.$el.addEventListener('dragenter', this._boundHandlers.dragenter);
                    this.$el.addEventListener('dragover', this._boundHandlers.dragover);
                    this.$el.addEventListener('dragleave', this._boundHandlers.dragleave);
                    this.$el.addEventListener('drop', this._boundHandlers.drop);

                    this.$el._x_cleanups = this.$el._x_cleanups || [];
                    this.$el._x_cleanups.push(() => {
                        if (this._boundHandlers) {
                            this.$el.removeEventListener('dragenter', this._boundHandlers.dragenter);
                            this.$el.removeEventListener('dragover', this._boundHandlers.dragover);
                            this.$el.removeEventListener('dragleave', this._boundHandlers.dragleave);
                            this.$el.removeEventListener('drop', this._boundHandlers.drop);
                        }
                    });
                }
            }">

                handleFileUpload(event) {
                    const files = event.target.files;
    
                    Array.from(files).forEach(file => {
                        const ext = file.name.split('.').pop().toLowerCase();
                       
                            const isImage = ['jpg', 'jpeg', 'png', 'bmp'].includes(ext);
                            
                            if (isImage) {
                                // Handle image preview
                                const reader = new FileReader();
                                reader.onload = e => {
                                    this.attachments.push({
                                        file: file,
                                        url: e.target.result,
                                        type: 'image',
                                        name: file.name,
                                        extension: ext
                                    });
                                    this.hasAttachments = true;
                                };
                                reader.readAsDataURL(file);
                            } else {
                                // Handle other file types
                                this.attachments.push({
                                    file: file,
                                    type: 'file',
                                    name: file.name,
                                    extension: ext
                                });
                                this.hasAttachments = true;
                            }
                    });
                }

    <div id="settingsModal" x-data="settingsModalProxy">
        <template x-teleport="body">
            <div x-show="isOpen" class="modal-overlay" @click.self="handleCancel()"
                @keydown.escape.window="handleCancel()" x-transition>
                <div class="modal-container">
                    <div class="modal-header">
                        <h2 x-text="settings.title"></h2>
                        <button class="modal-close" @click="handleCancel()">&times;</button>
                    </div>

                    <div class="modal-content" id="settings-content">
                        <div id="settings-sections">
                            <nav>
                                <ul>
                                    <template x-for="(section, index) in settings.sections" :key="section.title">
                                        <li>
                                            <a :href="'#section' + (index + 1)">
                                                <img :src="'/public/' + section.id +'.svg'"
                                                    :alt="section.title">
                                                <span x-text="section.title"></span>
                                            </a>
                                        </li>
                                    </template>
                                </ul>
                            </nav>
                        </div>
                        <template x-for="(section, sectionIndex) in settings.sections" :key="sectionIndex">
                            <div :id="'section' + (sectionIndex + 1)" class="section">
                                <div class="section-title" x-text="section.title"></div>
                                <div class="section-description" x-html="section.description"></div>

                                <template x-for="(field, fieldIndex) in section.fields" :key="fieldIndex">
                                    <div :class="{'field': true, 'field-full': field.type === 'textarea'}">
                                        <div class="field-label">
                                            <div class="field-title" x-text="field.title"></div>
                                            <div class="field-description" x-html="field.description || ''"></div>
                                        </div>

                                        <div class="field-control">
                                            <!-- Input field -->
                                            <template x-if="field.type === 'text'">
                                                <input type="text" :class="field.classes" :value="field.value"
                                                    :readonly="field.readonly === true"
                                                    @input="field.value = $event.target.value">
                                            </template>

                                            <!-- Number field -->
                                            <template x-if="field.type === 'number'">
                                                <input type="number" :class="field.classes" :value="field.value"
                                                    :readonly="field.readonly === true"
                                                    @input="field.value = $event.target.value"
                                                    :min="field.min" :max="field.max" :step="field.step">
                                            </template>


                                            <!-- Password field -->
                                            <template x-if="field.type === 'password'">
                                                <input type="password" :class="field.classes" :value="field.value"
                                                    :readonly="field.readonly === true"
                                                    @input="field.value = $event.target.value">
                                            </template>

                                            <!-- Textarea field -->
                                            <template x-if="field.type === 'textarea'">
                                                <textarea :class="field.classes" :value="field.value"
                                                    :readonly="field.readonly === true"
                                                    @input="field.value = $event.target.value"></textarea>
                                            </template>

                                            <!-- Switch field -->
                                            <template x-if="field.type === 'switch'">
                                                <label class="toggle">
                                                    <input type="checkbox" :checked="field.value"
                                                        :disabled="field.readonly === true"
                                                        @change="field.value = $event.target.checked">
                                                    <span class="toggler"></span>
                                                </label>
                                            </template>

                                            <!-- Range field -->
                                            <template x-if="field.type === 'range'">
                                                <div class="field-control">
                                                    <input type="range" :min="field.min" :max="field.max"
                                                        :step="field.step" :value="field.value"
                                                        :disabled="field.readonly === true"
                                                        @input="field.value = $event.target.value"
                                                        :class="field.classes">
                                                    <span class="range-value" x-text="field.value"></span>
                                                </div>
                                            </template>

                                            <!-- Button field -->
                                            <template x-if="field.type === 'button'">
                                                <button class="btn btn-field" :class="field.classes"
                                                    :disabled="field.readonly === true"
                                                    @click="handleFieldButton(field)" x-text="field.value"></button>
                                            </template>

                                            <!-- Select field -->
                                            <template x-if="field.type === 'select'">
                                                <select :class="field.classes" x-model="field.value"
                                                    :disabled="field.readonly === true">
                                                    <template x-for="option in field.options" :key="option.value">
                                                        <option :value="option.value" x-text="option.label"
                                                            :selected="option.value === field.value"></option>
                                                    </template>
                                                </select>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <div class="modal-footer">
                        <div id="buttons-container">
                            <template x-for="button in settings.buttons" :key="button.id">
                                <button :class="button.classes" @click="handleButton(button.id)"
                                    x-text="button.title"></button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- work_dir Browser Modal -->

    <div id="fileBrowserModal" x-data="fileBrowserModalProxy">

                            x-transition:enter-start="opacity-0"
                            x-transition:enter-end="opacity-100"
                            x-transition:leave="transition ease-in duration-300"

                            x-transition:leave-end="opacity-0">

                        </div>
                        <div x-show="!isLoading">

                                            stroke-width="1.5"></path>

                                <div id="current-path">
                                    <span id="path-text" x-text="browser.currentPath"></span>
                                </div>
                            </div>

                                <div class="file-header">
                                    <div class="file-cell" @click="toggleSort('name')">

                                            x-text="browser.sortDirection === 'asc' ? '↑' : '↓'">
                                        </span>
                                    </div>
                                    <div class="file-cell-size" @click="toggleSort('size')">
                                        Size
                                        <span x-show="browser.sortBy === 'size'"
                                            x-text="browser.sortDirection === 'asc' ? '↑' : '↓'">
                                        </span>
                                    </div>
                                    <div class="file-cell-date" @click="toggleSort('date')">
                                        Modified
                                        <span x-show="browser.sortBy === 'date'"
                                            x-text="browser.sortDirection === 'asc' ? '↑' : '↓'">
                                        </span>
                                    </div>
                                </div>

                                <template x-if="browser.entries.length">

                                                @click="file.is_dir ? navigateToFolder(file.path) : downloadFile(file)">
                                                <img :src="'/public/' + (file.type === 'unknown' ? 'file' : (isArchive(file.name) ? 'archive' : file.type)) + '.svg'"
                                                    class="file-icon" :alt="file.type">

                                            </div>
                                            <div class="file-size" x-text="formatFileSize(file.size)"></div>
                                            <div class="file-date" x-text="formatDate(file.modified)"></div>

                                                            stroke-width="0"></path>
                                                    </svg>
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                </template>

                                <!-- Empty State -->
                                <template x-if="!browser.entries.length">
                                    <div class="no-files">
                                        No files found
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <div id="buttons-container">
                            <label class="btn btn-upload">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">

                            <button class="btn btn-cancel" @click="handleClose()">Close Browser</button>

                                </button>
                                <button class="toolbar-button" @click="toggleWrap()" :class="{ active: wordWrap }" title="Toggle Word Wrap">
                                    <svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 110 110"><path d="M94.7 27.2H15.3c-.6 0-1-.5-1-1v-1.9c0-.6.5-1 1-1h79.4c.6 0 1 .5 1 1v1.9c0 .5-.4 1-1 1M57.1 52.2H15.3c-.6 0-1-.5-1-1v-1.9c0-.6.5-1 1-1h41.8c.6 0 1 .5 1 1v1.9c0 .6-.4 1-1 1M44.6 77.3H15.3c-.6 0-1-.5-1-1v-1.9c0-.6.5-1 1-1h29.3c.6 0 1 .5 1 1v1.9c0 .5-.5 1-1 1M92.7 70.1c2.6-4.5 2.6-10.1 0-14.6s-7.5-7.3-12.7-7.3h-6.3c-1.6 0-2.2 1.1-2.2 2.1s.7 2.1 2.1 2.1h6.3c3.7 0 7.2 2 9 5.2 1.9 3.2 1.9 7.2 0 10.4s-5.3 5.2-9 5.2H67.6l7.5-5.6c1.2-.8.9-2 .8-2.4-.2-.7-.9-1.5-2-1.5-.5 0-.9.2-1.3.4L60 73.6c-.5.4-.9 1-.9 1.7s.3 1.3.9 1.7l12.5 9.4c1.2.9 2.3.3 2.9-.5s.8-2-.4-2.9l-7.4-5.6H80c5.3 0 10.1-2.8 12.7-7.3" style="fill:currentColor"/></svg>
                                </button>
                                <div class="mode-switch" :class="{ 'code-active': isCodeMode }" @click="toggleMode()" title="Switch Editor Mode">
                                    <div class="mode-switch-slider">
                                        <div class="mode-icon text-mode">
                                            <span>A</span>
                                        </div>
                                        <div class="mode-icon code-mode">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M16 18l6-6-6-6M8 6l-6 6 6 6"></path>
                                            </svg>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="toolbar-group">
                                <div class="attachment-wrapper" x-data="{ showTooltip: false }">
                                    <label for="modal-file-input" class="toolbar-button" @mouseover="showTooltip = true" @mouseleave="showTooltip = false" title="Add attachments">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                            <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z" />
                                        </svg>
                                    </label>
                                    <input type="file" id="modal-file-input" accept="*" multiple style="display: none" @change="handleFileUpload($event)">
                                    <div x-show="showTooltip" class="tooltip">
                                        Add attachments to the message
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Preview section -->
                        <div x-show="hasAttachments" class="preview-section">
                            <template x-for="(attachment, index) in attachments" :key="index">
                                <div class="preview-item" :class="{'image-preview': attachment.type === 'image'}">
                                    <template x-if="attachment.type === 'image'">
                                        <img :src="attachment.url" :alt="attachment.name">
                                    </template>
                                    <template x-if="attachment.type === 'file'">
                                        <div class="file-preview">
                                            <span class="filename" x-text="attachment.name"></span>
                                            <span class="extension" x-text="attachment.extension.toUpperCase()"></span>
                                        </div>
                                    </template>
                                    <button @click="attachments.splice(index, 1); hasAttachments = attachments.length > 0"
                                        class="remove-attachment">&times;</button>
                                </div>
                            </template>
                        </div>

                        <textarea id="full-screen-input" x-model="inputText" 
                            placeholder="Type your message here..." 
                            @keydown.ctrl.enter="handleClose()"
                            @keydown.ctrl.z.prevent="undo()"
                            @keydown.ctrl.shift.z.prevent="redo()"
                            :style="{ 'white-space': wordWrap ? 'pre-wrap' : 'pre', display: isCodeMode ? 'none' : 'block' }"
                            @input="updateHistory()"></textarea>
                            
                        <div id="ace-editor" :style="{ display: isCodeMode ? 'block' : 'none' }"></div>
                    </div>
                    <div class="modal-footer">
                        <div id="buttons-container">
                            <button class="btn btn-ok" @click="handleClose()">Done (Ctrl+Enter)</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Drag and Drop Overlay -->
    <div id="dragdrop-overlay" 
         x-cloak
         x-data="{ isVisible: false }" 
         x-show="isVisible && !$store.fullScreenInputModal.isOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="dragdrop-overlay active">
        <img src="public/dragndrop.svg" alt="Drop files" class="dragdrop-icon">
        <div class="dragdrop-text">Drop files to attach them to your message</div>
        <div class="dragdrop-subtext"></div>
    </div>

</body>

</html>
